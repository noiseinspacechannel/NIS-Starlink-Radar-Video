                    float angEl = atan(vPos.y, z);
                    float nAz = angAz / max(u_halfAngleAz, 0.0001);
                    float nEl = angEl / max(u_halfAngleEl, 0.0001);
                    float sAz = abs(nAz) < 0.001 ? 1.0 : sin(PI*nAz)/(PI*nAz);
                    float sEl = abs(nEl) < 0.001 ? 1.0 : sin(PI*nEl)/(PI*nEl);
                    float pattern = sAz*sAz * sEl*sEl;
                    float numP = max(u_numPulses, 1.0);
                    float phase = fract(z * numP - u_time + 0.5) - 0.5;
                    float pw = max(u_dutyCycle * 0.5, 0.015);
                    float pulse = exp(-pow(phase/pw, 2.0));
                    float intensity = pow(sqrt(pattern), 1.0 / max(u_logScale, 0.2)) * pulse;
                    float fade = 1.0 - smoothstep(1.05, 1.25, z);
                    intensity *= fade;
                    intensity *= u_brightness;
                    if(intensity < 0.015) discard;
                    vec3 col = mix(u_color, vec3(1.0, 0.95, 0.3), clamp(intensity, 0.0, 1.0));
                    gl_FragColor = vec4(col * (1.0 + intensity * 0.3), clamp(intensity * 0.9, 0.0, 1.0));
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const pulseCloudMesh = new THREE.Points(pulseGeo, pulseMat);

        // Return signal (echo) — frequency-dependent radar BRDF scatter model
        // Mesh local frame: +Z = surface normal (outward from Earth), origin = ground contact
        const echoUniforms = {
            u_time: { value: 0 },
            u_numPulses: { value: 10.0 },
            u_dutyCycle: { value: 0.2 },
            u_brightness: { value: 5.0 },
            u_incDir: { value: new THREE.Vector3(0, 0, -1) },
            u_fc: { value: 10.0 },
            u_color: { value: new THREE.Color(0.15, 0.45, 1.0) }
        };
        const echoGeo = new THREE.BufferGeometry();
        const ePts = new Float32Array(3 * 10);
        echoGeo.setAttribute('position', new THREE.BufferAttribute(ePts, 3));
        const echoMat = new THREE.ShaderMaterial({
            uniforms: echoUniforms,
            vertexShader: `
                varying vec3 vPos;
                void main(){
                    vPos = position;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = max(1.5, 4.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                #define PI 3.14159265359
                uniform float u_time;
                uniform float u_numPulses;
                uniform float u_dutyCycle;
                uniform float u_brightness;
                uniform vec3 u_incDir;
                uniform float u_fc;
                uniform vec3 u_color;
                varying vec3 vPos;

                float interpBRDF(float fc, float vL, float vC, float vX, float vK) {
                    float knots[4]; float vals[4];
                    knots[0]=1.3; knots[1]=5.4; knots[2]=10.0; knots[3]=18.0;
                    vals[0]=vL; vals[1]=vC; vals[2]=vX; vals[3]=vK;
                    if(fc <= knots[0]) return vals[0];
                    if(fc >= knots[3]) return vals[3];
                    for(int i=0; i<3; i++){
                        if(fc <= knots[i+1]){
                            float t = (fc - knots[i]) / (knots[i+1] - knots[i]);
                            return mix(vals[i], vals[i+1], t);
                        }
                    }
                    return vals[3];
                }

                void main(){
                    float dist = length(vPos);
                    if(dist < 0.005 || dist > 1.15) discard;
                    vec3 scatterDir = normalize(vPos);

                    // Surface normal = +Z in this frame
                    vec3 normal = vec3(0.0, 0.0, 1.0);

                    // Frequency-dependent BRDF weights
                    float wDiff = interpBRDF(u_fc, 0.50, 0.80, 0.85, 0.93);
                    float wSpec = interpBRDF(u_fc, 0.40, 0.17, 0.12, 0.03);
                    float wBack = interpBRDF(u_fc, 0.01, 0.03, 0.03, 0.05);
                    float specW = interpBRDF(u_fc, 0.015, 0.030, 0.045, 0.080);

                    // Diffuse: cosine-weighted from surface normal
                    float diffuse = max(dot(scatterDir, normal), 0.0);

                    // Specular: Beckmann lobe around mirror reflection of incident beam
                    vec3 specDir = u_incDir - 2.0 * dot(u_incDir, normal) * normal;
                    float cosSpec = max(dot(scatterDir, specDir), 0.0);
                    float specAngle = acos(clamp(cosSpec, -1.0, 1.0));
                    float specular = exp(-(specAngle * specAngle) / max(specW, 0.001));

                    // Backscatter: retro-reflection toward transmitter
                    float cosRetro = max(dot(scatterDir, -u_incDir), 0.0);
                    float retroAngle = acos(clamp(cosRetro, -1.0, 1.0));
                    float backscatter = exp(-(retroAngle * retroAngle) / 0.12);

                    float brdf = diffuse * wDiff + specular * wSpec + backscatter * wBack;

                    // Spherical pulse wavefronts from ground contact
                    float numP = max(u_numPulses, 1.0);
                    float phase = fract(dist * numP - u_time + numP + 0.5) - 0.5;
                    float pw = max(u_dutyCycle * 0.5, 0.015);
                    float pulse = exp(-pow(phase/pw, 2.0));

                    float rangeLoss = 1.0 / (1.0 + dist * dist * 5.0);
                    float intensity = brdf * pulse * rangeLoss * 0.15;
                    intensity *= u_brightness;
                    if(intensity < 0.004) discard;
                    vec3 col = mix(u_color, vec3(0.5, 0.8, 1.0), clamp(intensity * 2.0, 0.0, 1.0));
                    gl_FragColor = vec4(col * (1.0 + intensity * 0.3), clamp(intensity * 0.65, 0.0, 1.0));
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const echoCloudMesh = new THREE.Points(echoGeo, echoMat);
        const echoMeshPool = []; // Pool of echo cloud clones for distributed grid



        // Ground track line (hidden for realism as per user request)
        // const trackGeo = new THREE.BufferGeometry();
        // const trackMat = new THREE.LineBasicMaterial({ color: 0x40e8a0, transparent: true, opacity: 0.4 });
        // const trackLine = new THREE.Line(trackGeo, trackMat);
        // scene.add(trackLine);

        let satPos = new THREE.Vector3();
        let satVel = new THREE.Vector3();

        function updateSatPosition() {
            const altScene = P.alt * SC;
            const orbitR = ER + altScene;

            // Derive orbit phase from latitude: sin(lat) = sin(inc) * sin(phase)
            const inc = getOrbitIncl();
            const sinInc = Math.sin(inc);
            const latRad = P.lat * DEG;
            // Clamp to avoid asin domain errors when |lat| > inc
            const sinPhase = Math.min(Math.max(Math.sin(latRad) / Math.max(sinInc, 1e-6), -1), 1);
            orbitPhase = -Math.asin(sinPhase);

            const cx = orbitR * Math.cos(orbitPhase);
            const cy = orbitR * Math.sin(orbitPhase);
            satPos.set(cx, 0, cy);

            // Prograde: velocity in direction of increasing phase
            const vx = Math.sin(orbitPhase);
            const vy = -Math.cos(orbitPhase);
            satVel.set(vx, 0, vy).normalize();

            // Apply inclination
            const rotInc = new THREE.Matrix4().makeRotationX(inc);
            satPos.applyMatrix4(rotInc);
            satVel.applyMatrix4(rotInc);

            // Re-orthogonalize axes for sat matrix
            const zAxis = satPos.clone().normalize().negate(); // Nadir (+Z local points to earth center)
            const yAxis = satVel.clone(); // Velocity (+Y local is forward)
            const xAxis = new THREE.Vector3().crossVectors(yAxis, zAxis).normalize(); // Cross-track (+X local is right)

            const m = new THREE.Matrix4();
            m.makeBasis(xAxis, yAxis, zAxis);
            m.setPosition(satPos);

            satGroup.matrixAutoUpdate = false;
            satGroup.matrix.copy(m);

            // Ground track is disabled for realism
        }

        function rebuild3D() {
            updateSatPosition();

            // Clear beam groups
            while (beamGroup.children.length) beamGroup.remove(beamGroup.children[0]);
            while (swathGroup.children.length) swathGroup.remove(swathGroup.children[0]);

            // Sat Local Frame: +Z=Nadir, +Y=Velocity(Azimuth), +X=CrossTrack(Elevation look)
            const up = new THREE.Vector3(0, 0, 1);
            const velDir = new THREE.Vector3(0, 1, 0);
            const crossTrack = new THREE.Vector3(1, 0, 0);

            const offNadir = Math.PI / 2 - SAR.psi;
            const squintRad = P.sqt * DEG;
            const beamDir = new THREE.Vector3()
                .addScaledVector(up, Math.cos(offNadir))
                .addScaledVector(crossTrack, Math.sin(offNadir) * Math.cos(squintRad))
                .addScaledVector(velDir, Math.sin(offNadir) * Math.sin(squintRad))
                .normalize();

            // Ray-sphere intersection to find distance to Earth surface
            const satWorldPos = new THREE.Vector3().setFromMatrixPosition(satGroup.matrix);
            const dirWorld = beamDir.clone().applyMatrix4(new THREE.Matrix4().extractRotation(satGroup.matrix));
            const aa = dirWorld.dot(dirWorld);
            const bb = 2 * satWorldPos.dot(dirWorld);
            const cc = satWorldPos.dot(satWorldPos) - ER * ER;
            const disc = bb * bb - 4 * aa * cc;
            if (disc < 0) return;
            const distToGround = (-bb - Math.sqrt(disc)) / (2 * aa);
            if (distToGround <= 0) return;

            // Rebuild Pulse Geometry if voxel counts changed
            const txCount = Math.floor(P.txVoxels);
            if (!pulseCloudMesh.geometry.attributes.position || pulseCloudMesh.geometry.attributes.position.count !== txCount) {
                const MAX_CONE_HALF = 0.18;
                const pPts = new Float32Array(txCount * 3);
                for (let i = 0; i < txCount; i++) {
                    const z = 0.005 + 0.995 * Math.cbrt(Math.random());
                    const angR = MAX_CONE_HALF * Math.sqrt(Math.random());
                    const angA = Math.random() * Math.PI * 2;
                    pPts[i * 3] = z * Math.tan(angR) * Math.cos(angA);
                    pPts[i * 3 + 1] = z * Math.tan(angR) * Math.sin(angA);
                    pPts[i * 3 + 2] = z;
                }
                pulseCloudMesh.geometry.setAttribute('position', new THREE.BufferAttribute(pPts, 3));
            }

            // Count how many grid emitters we need (for dividing voxel budget)
            const GRID_SPACING_M_pre = P.echoSpacing * 1000;
            const nAzPre = Math.ceil((SAR.swath_az / 2) / GRID_SPACING_M_pre);
            const nRngPre = Math.ceil((SAR.swath_ground_range / 2) / GRID_SPACING_M_pre);
            let numGridEmitters = 0;
            for (let ia = -nAzPre; ia <= nAzPre; ia++)
                for (let ir = -nRngPre; ir <= nRngPre; ir++)
                    if (Math.abs(ia * GRID_SPACING_M_pre) <= SAR.swath_az / 2 && Math.abs(ir * GRID_SPACING_M_pre) <= SAR.swath_ground_range / 2)
                        numGridEmitters++;
            numGridEmitters = Math.max(numGridEmitters, 1);

            // Rebuild Echo Geometry if voxel count changed — divide total budget among emitters
            const rxCountPerEmitter = Math.max(1000, Math.floor(P.rxVoxels / numGridEmitters));
            if (!echoGeo.attributes.position || echoGeo.attributes.position.count !== rxCountPerEmitter) {
                const ePts = new Float32Array(rxCountPerEmitter * 3);
                for (let i = 0; i < rxCountPerEmitter; i++) {
                    // Upper hemisphere only (z >= 0 = above surface), centered at origin
                    const r = Math.cbrt(Math.random()) * 1.2;
                    const theta = Math.acos(Math.random()); // 0 to PI/2
                    const phi = Math.random() * Math.PI * 2;
                    ePts[i * 3] = r * Math.sin(theta) * Math.cos(phi);
                    ePts[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
                    ePts[i * 3 + 2] = r * Math.cos(theta); // always >= 0
                }
                echoGeo.setAttribute('position', new THREE.BufferAttribute(ePts, 3));
            }

            // Update pulse shader uniforms
            pulseUniforms.u_numPulses.value = SAR.R_slant * P.prf / C;
            pulseUniforms.u_dutyCycle.value = P.dc / 100;
            pulseUniforms.u_halfAngleAz.value = SAR.theta_az / 2;
            pulseUniforms.u_halfAngleEl.value = SAR.theta_el / 2;
            pulseUniforms.u_brightness.value = P.txBright;
            pulseUniforms.u_logScale.value = P.logScale;

            // Echo uniforms
            echoUniforms.u_numPulses.value = pulseUniforms.u_numPulses.value;
            echoUniforms.u_dutyCycle.value = pulseUniforms.u_dutyCycle.value;
            echoUniforms.u_brightness.value = P.rxBright;
            echoUniforms.u_fc.value = P.fc;

            // Align pulse cloud: +Z along beam, +X along azimuth (velocity projected), +Y along elevation
            const zAx = beamDir.clone().normalize();
            const velProj = velDir.clone().sub(zAx.clone().multiplyScalar(velDir.dot(zAx)));
            const xAx = velProj.length() > 0.001 ? velProj.normalize() : crossTrack.clone();
            const yAx = new THREE.Vector3().crossVectors(zAx, xAx).normalize();
            const rotM = new THREE.Matrix4().makeBasis(xAx, yAx, zAx);

            pulseCloudMesh.position.set(0, 0, 0);
            pulseCloudMesh.setRotationFromMatrix(rotM);
            const distExtension = 100 * SC; // Extra 100km buffer for pulse to propagate into earth without clipping
            pulseCloudMesh.scale.set(distToGround + distExtension, distToGround + distExtension, distToGround + distExtension);
            beamGroup.add(pulseCloudMesh);

            // Echo cloud — positioned at ground contact, +Z = surface normal
            const gpLocal = beamDir.clone().multiplyScalar(distToGround); // ground point in satGroup local
            const surfNormal = gpLocal.clone().normalize().negate(); // points away from earth center (in satGroup coords, sat is at origin, ground is outward, so normal = -normalized(gpLocal) since sat is above)
            // Actually: satGroup is at sat position. gpLocal points from sat toward ground.
            // In world, ground point = satPos + gpLocal. Surface normal = normalized(satPos + gpLocal) (radially outward).
            // But in satGroup local, the sat is at (0,0,0). gpLocal points toward ground.
            // Surface normal in satGroup local coords:
            const satPosLocal = new THREE.Vector3(0, 0, 0);
            // world ground pos = satWorldPos + dirWorld * distToGround; normal = normalized(world ground pos)
            // But we need it in satGroup local frame.
            // satGroup local -> world: satGroup.matrix. So ground in world = satGroup.matrix * gpLocal
            // Surface normal in world = normalized(ground_world_pos)
            // Surface normal in satGroup local = satGroup.matrix.inverse * normalized(ground_world_pos)
            const echoGpWorld = satWorldPos.clone().add(dirWorld.clone().multiplyScalar(distToGround));
            const surfNormWorld = echoGpWorld.clone().normalize(); // radially outward from Earth center
            // Transform surfNormWorld to satGroup local frame
            const invSatRot = new THREE.Matrix4().extractRotation(satGroup.matrix).invert();
            const surfNormLocal = surfNormWorld.clone().applyMatrix4(invSatRot);

            // Build echo rotation: +Z = surfNormLocal, make an orthonormal frame
            const echoZ = surfNormLocal.clone().normalize();
            // Pick an arbitrary perpendicular to echoZ for X
            let echoX = new THREE.Vector3().crossVectors(velDir, echoZ);
            if (echoX.length() < 0.001) echoX = new THREE.Vector3().crossVectors(new THREE.Vector3(1, 0, 0), echoZ);
            echoX.normalize();
            const echoY = new THREE.Vector3().crossVectors(echoZ, echoX).normalize();
            const echoRotM = new THREE.Matrix4().makeBasis(echoX, echoY, echoZ);

            // Beam incidence direction in echo-local frame
            const beamDirNorm = beamDir.clone().normalize();
            const echoRotInv = echoRotM.clone().invert();
            const incDirLocal = beamDirNorm.clone().applyMatrix4(echoRotInv);
            echoUniforms.u_incDir.value.copy(incDirLocal);

            // === Distributed echo grid: place emitters across the swath ===
            const GRID_SPACING_M = P.echoSpacing * 1000;
            const swathAz_m = SAR.swath_az; // azimuth footprint in meters
            const swathRng_m = SAR.swath_ground_range; // ground range footprint in meters

            // Number of emitters needed in each direction from center
            const nAz = Math.ceil((swathAz_m / 2) / GRID_SPACING_M);
            const nRng = Math.ceil((swathRng_m / 2) / GRID_SPACING_M);

            // Scene scale factor: meters to scene units
            const m2scene = SC / 1000; // SC is scene scale, /1000 because SC was defined for km

            let echoIdx = 0;
            for (let ia = -nAz; ia <= nAz; ia++) {
                for (let ir = -nRng; ir <= nRng; ir++) {
                    const offsetAz_m = ia * GRID_SPACING_M;
                    const offsetRng_m = ir * GRID_SPACING_M;

                    // Check if this grid point is within the swath box
                    if (Math.abs(offsetAz_m) > swathAz_m / 2) continue;
                    if (Math.abs(offsetRng_m) > swathRng_m / 2) continue;

                    // Get or create an echo mesh clone
                    let mesh;
                    if (echoIdx < echoMeshPool.length) {
                        mesh = echoMeshPool[echoIdx];
                    } else {
                        mesh = new THREE.Points(echoGeo, echoMat);
                        echoMeshPool.push(mesh);
                    }

                    // Position this emitter: offset from center ground point
                    // echoX = cross-track (range), echoY = along-track (azimuth), echoZ = surface normal
                    // Offsets in satGroup local frame using the echo coordinate axes
                    const offsetLocal = new THREE.Vector3()
                        .addScaledVector(echoX, offsetRng_m * m2scene)
                        .addScaledVector(echoY, offsetAz_m * m2scene);

                    mesh.position.copy(gpLocal).add(offsetLocal);
                    mesh.setRotationFromMatrix(echoRotM);
                    mesh.scale.set(distToGround, distToGround, distToGround);
                    beamGroup.add(mesh);
                    echoIdx++;
                }
            }

            // Hide any unused pool meshes (they won't be in beamGroup since we cleared it)

            // Ground footprint — sinc² beam pattern projection
            const fpScaleAz = Math.tan(SAR.theta_az * 2.5) * distToGround; // ~5 beamwidths total
            const fpScaleEl = Math.tan(SAR.theta_el * 2.5) * distToGround;
            const fpGeo = new THREE.PlaneGeometry(fpScaleAz * 2, fpScaleEl * 2, 1, 1);
            const fpMat = new THREE.ShaderMaterial({
                uniforms: {
                    u_halfAngleAz: { value: SAR.theta_az / 2 },
                    u_halfAngleEl: { value: SAR.theta_el / 2 },
                    u_scaleAz: { value: fpScaleAz },
                    u_scaleEl: { value: fpScaleEl },
                    u_brightness: { value: P.txBright }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main(){
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    #define PI 3.14159265359
                    uniform float u_halfAngleAz;
                    uniform float u_halfAngleEl;
                    uniform float u_scaleAz;
                    uniform float u_scaleEl;
                    uniform float u_brightness;
                    varying vec2 vUv;
                    void main(){
                        float angAz = (vUv.x - 0.5) * 2.0 * atan(u_scaleAz);
                        float angEl = (vUv.y - 0.5) * 2.0 * atan(u_scaleEl);
                        float nAz = angAz / max(u_halfAngleAz, 0.0001);
                        float nEl = angEl / max(u_halfAngleEl, 0.0001);
                        float sAz = abs(nAz) < 0.001 ? 1.0 : sin(PI*nAz)/(PI*nAz);
                        float sEl = abs(nEl) < 0.001 ? 1.0 : sin(PI*nEl)/(PI*nEl);
                        float pattern = sAz*sAz * sEl*sEl;
                        if(pattern < 0.01) discard;
                        vec3 baseCol = vec3(1.0, 0.35, 0.05);
                        vec3 col = mix(baseCol, vec3(1.0, 0.95, 0.3), sqrt(pattern));
                        float alpha = pattern * 0.35 * u_brightness;
                        gl_FragColor = vec4(col * u_brightness * 0.3, clamp(alpha, 0.0, 1.0));
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const fp = new THREE.Mesh(fpGeo, fpMat);
            const gpWorld = satWorldPos.clone().add(dirWorld.clone().multiplyScalar(distToGround));
            const gNorm = gpWorld.clone().normalize();
            const gpEL = gpWorld.clone().applyMatrix4(earthGroup.matrixWorld.clone().invert());
            const gnEL = gNorm.clone().applyMatrix4(earthGroup.matrixWorld.clone().invert());
            fp.position.copy(gpEL.clone().add(gnEL.clone().multiplyScalar(0.05)));
            // Orient the plane: normal = gnEL, and align the plane's Y with the squinted beam projection
            // We want the plane's local X/Y to match the beam's azimuth/elevation cross-sections
            // gnEL is the surface normal.
            const zAxisPlane = gnEL.clone();

            // Project the beam's Y axis (azimuth/velocity) onto the ground plane
            const bDirY = velDir.clone().applyMatrix4(satGroup.matrix).applyMatrix4(earthGroup.matrixWorld.clone().invert()).normalize();
            const yAxisPlane = bDirY.clone().sub(zAxisPlane.clone().multiplyScalar(bDirY.dot(zAxisPlane))).normalize();
            const xAxisPlane = new THREE.Vector3().crossVectors(yAxisPlane, zAxisPlane).normalize();

            const fpRot = new THREE.Matrix4().makeBasis(xAxisPlane, yAxisPlane, zAxisPlane);
            fp.setRotationFromMatrix(fpRot);

            // Note: because the shader uses vUv.x for Az and vUv.y for El, we matched X=Az and Y=El originally.
            // Wait, Shader: angAz = (vUv.x - 0.5), angEl = (vUv.y - 0.5).
            // Azimuth = velocity direction. Which is yAxisPlane here.
            // So we want the plane's local X (vUv.x) to align with yAxisPlane, and local Y (vUv.y) to align with xAxisPlane.
            // Let's swap the basis:
            const fpRotCorrected = new THREE.Matrix4().makeBasis(yAxisPlane, xAxisPlane.clone().negate(), zAxisPlane);
            fp.setRotationFromMatrix(fpRotCorrected);

            // Add a yellow highlight box for the 3dB main beam swath
            const wAz = Math.tan(SAR.theta_az / 2) * distToGround * 2;
            const wEl = Math.tan(SAR.theta_el / 2) * distToGround * 2;
            const boxGeo = new THREE.PlaneGeometry(wEl, wAz);
            const boxEdges = new THREE.EdgesGeometry(boxGeo);
            const boxMat = new THREE.LineBasicMaterial({ color: 0xe8d040, transparent: true, opacity: 0.8 });
            const boxMesh = new THREE.LineSegments(boxEdges, boxMat);
            boxMesh.position.z = 0.01; // slightly above to avoid z-fighting
            fp.add(boxMesh);

            swathGroup.add(fp);
        }

        // ============================================================
        //  SIGNAL TIMELINE VIEW (Canvas 2D)
        // ============================================================
        const sigCanvas = document.getElementById('sig-canvas');
        const sigCtx = sigCanvas.getContext('2d');

        function drawSignal(dt) {
            const sw = document.getElementById('sig-wrap');
            const W = sw.clientWidth, H = sw.clientHeight;
            sigCtx.fillStyle = '#171717';
            sigCtx.fillRect(0, 0, W, H);
            const PRI = SAR.PRI, PW = SAR.PW;
            const twoR_near = 2 * SAR.R_near / C;
            const twoR_far = 2 * SAR.R_far / C;
            const twoR_center = 2 * SAR.R_slant / C;
            const echoMod = ((twoR_near % PRI) + PRI) % PRI;
            const echoDur = twoR_far - twoR_near;
            const nWrap = Math.floor(twoR_center / PRI);
            // Use consistent time base (counts in PRI units same as 3D and 2D views)
            const simTimePRI = pulseUniforms.u_time.value;
            // Pixels per PRI — scales with PRF (higher PRF = narrower PRIs)
            // Target: ~4 PRIs visible at PRF=4000; scale proportionally
            const refPRI = 1 / 4000;
            const priW = Math.max(20, (W / 4) * (PRI / refPRI));
            const scrollX = simTimePRI * priW;
            const baseY = H * 0.62, ampMax = H * 0.38;
            const numP = Math.ceil(W / Math.max(priW, 1)) + 2;
            const startP = Math.floor(scrollX / priW);
            const t2px = priW / PRI;
            sigCtx.strokeStyle = '#252525'; sigCtx.lineWidth = 1;
            for (let i = startP; i <= startP + numP; i++) {
                const x = i * priW - scrollX;
                sigCtx.beginPath(); sigCtx.moveTo(x, 30); sigCtx.lineTo(x, H); sigCtx.stroke();
            }
            sigCtx.strokeStyle = '#2a2a2a'; sigCtx.lineWidth = 0.5;
            sigCtx.beginPath(); sigCtx.moveTo(0, baseY); sigCtx.lineTo(W, baseY); sigCtx.stroke();
            for (let i = startP; i <= startP + numP; i++) {
                const xO = i * priW - scrollX;
                if (xO > W + priW || xO < -priW) continue;
                const txW = Math.max(PW * t2px, 2);
                const tg = sigCtx.createLinearGradient(xO, baseY - ampMax, xO, baseY);
                tg.addColorStop(0, 'rgba(232,208,64,0.85)'); tg.addColorStop(1, 'rgba(232,180,20,0.15)');
                sigCtx.fillStyle = tg;
                sigCtx.fillRect(xO, baseY - ampMax, txW, ampMax);
                const totalDur = echoDur + PW;
                const segs = [];
                let seg_s = echoMod, seg_rem = totalDur, seg_f0 = 0;
                while (seg_rem > 1e-12 && segs.length < 20) {
                    const chunk = Math.min(seg_rem, PRI - seg_s);
                    const seg_f1 = seg_f0 + chunk / totalDur;
                    segs.push({ s: seg_s, e: seg_s + chunk, f0: seg_f0, f1: seg_f1 });
                    seg_s = 0; seg_rem -= chunk; seg_f0 = seg_f1;
                }
                segs.forEach(seg => {
                    sigCtx.beginPath(); sigCtx.moveTo(xO + seg.s * t2px, baseY);
                    for (let s = 0; s <= 100; s++) {
                        const lf = s / 100, gf = seg.f0 + lf * (seg.f1 - seg.f0);
                        const t = twoR_near + gf * totalDur;

                        // Overlap of pulse [t - PW, t] and swath [twoR_near, twoR_far]
                        const overlapStart = Math.max(t - PW, twoR_near);
                        const overlapEnd = Math.min(t, twoR_far);
                        const overlap = Math.max(0, overlapEnd - overlapStart);
                        const envelope = overlap / PW;

                        let g = 0;
                        if (envelope > 0) {
                            const R_center = ((overlapStart + overlapEnd) / 2) * C / 2;
                            const R_orb = R_E + SAR.h;
                            const cos_look = (R_orb * R_orb + R_center * R_center - R_E * R_E) / (2 * R_orb * Math.max(1, R_center));
                            const look_angle_target = Math.acos(Math.max(-1, Math.min(1, cos_look)));
                            const dep_angle_target = Math.PI / 2 - look_angle_target;

                            const tx_dir = beamPatternEl(dep_angle_target - SAR.psi);
                            let rx_dir = tx_dir; // Default for non-SCORE (Rx uses same broad static beam)
                            let visualGainBoost = 1.0;

                            if (P.score) {
                                // SCORE: Narrow Rx pencil beam perfectly tracks the echo center across the swath.
                                const t_center = Math.max(twoR_near, Math.min(t - PW / 2, twoR_far));
                                const R_score_center = (t_center * C) / 2;

                                const R_orb_s = R_E + SAR.h;
                                const cos_look_s = (R_orb_s * R_orb_s + R_score_center * R_score_center - R_E * R_E) / (2 * R_orb_s * Math.max(1, R_score_center));
                                const scoreDep = Math.PI / 2 - Math.acos(Math.max(-1, Math.min(1, cos_look_s)));

                                const angOff = dep_angle_target - scoreDep;
                                const uScore = Math.PI * (SAR.D_el * (Math.pow(10, P.scoreGain / 10) / Math.pow(10, P.gel / 10))) * Math.sin(angOff) / SAR.lam;
                                rx_dir = Math.abs(uScore) < 1e-6 ? 1.0 : Math.pow(Math.sin(uScore) / uScore, 2);

                                // Peak return amplitude matches non-SCORE at boresight
                                visualGainBoost = 1.0;
                            }

                            // Two-way voltage is proportional to sqrt(tx_power * rx_power)
                            g = Math.sqrt(tx_dir * rx_dir) * visualGainBoost * envelope;
                        }

                        const lt = seg.s + lf * (seg.e - seg.s);
                        sigCtx.lineTo(xO + lt * t2px, baseY - g * ampMax * 0.6);
                    }
                    sigCtx.lineTo(xO + seg.e * t2px, baseY); sigCtx.closePath();
                    const rg = sigCtx.createLinearGradient(0, baseY - ampMax * 0.5, 0, baseY);
                    const rc = P.score ? '64,232,160' : '58,160,232';
                    rg.addColorStop(0, `rgba(${rc},0.45)`); rg.addColorStop(1, `rgba(${rc},0.05)`);
                    sigCtx.fillStyle = rg; sigCtx.fill();
                    sigCtx.strokeStyle = P.score ? '#40e8a0' : '#3aa0e8'; sigCtx.lineWidth = 1; sigCtx.stroke();
                });
                sigCtx.fillStyle = '#333'; sigCtx.font = '8px sans-serif'; sigCtx.fillText(`${i + 1}`, xO + 3, H - 4);
            }
            sigCtx.fillStyle = 'rgba(23,23,23,0.9)'; sigCtx.fillRect(0, 0, W, 28);
            sigCtx.strokeStyle = '#333'; sigCtx.beginPath(); sigCtx.moveTo(0, 28); sigCtx.lineTo(W, 28); sigCtx.stroke();
            sigCtx.fillStyle = '#6a8aaa'; sigCtx.font = '10px sans-serif';
            sigCtx.fillText(`PW: ${(PW * 1e6).toFixed(1)} \u03bcs`, 130, 18);
            sigCtx.fillText(`PRI: ${(PRI * 1e6).toFixed(0)} \u03bcs`, 200, 18);
            sigCtx.fillText(`Echo: ${(twoR_center * 1e6).toFixed(0)} \u03bcs (\u00d7${nWrap})`, 270, 18);
            if (W > 500) sigCtx.fillText(`TBP: ${SAR.TBP.toFixed(0)}`, 380, 18);
        }

        // ============================================================
        //  2-D RANGE-SWATH PULSE VIEW
        // ============================================================
        const mapCanvas = document.getElementById('map-canvas');
        const mapCtx = mapCanvas.getContext('2d');
        const PSPD_CONST = 250, MXRNG = 600, TLH = 70; // PSPD_CONST = constant pulse speed (px/sec)

        function drawMap(dt) {
            const mw = document.getElementById('map-wrap');
            const W = mw.clientWidth, H = mw.clientHeight;
            mapCtx.fillStyle = '#171717'; mapCtx.fillRect(0, 0, W, H);
            const vH = H - TLH;

            // === Curved Earth Geometry ===
            const h_m = P.alt * 1e3;
            const R_orbit_m = R_E + h_m;
            const margin = 30;
            const sY = margin; // satellite vertical position
            const sX = W * 0.35; // satellite horizontal position

            // Spherical geometry: compute gamma angles (angle at Earth center from nadir)
            const target_grazing = Math.max(P.grz * DEG, 0.01);
            const inc_c = Math.PI / 2 - target_grazing;
            const sin_look_c = (R_E / R_orbit_m) * Math.sin(inc_c);
            const look_c = Math.asin(sin_look_c);
            const gamma_c = inc_c - look_c;
            const psi_c = Math.PI / 2 - look_c;

            const dep_n = psi_c + SAR.theta_el / 2;
            const look_n = Math.max(Math.PI / 2 - dep_n, 0);
            const sin_inc_n = Math.min((R_orbit_m / R_E) * Math.sin(look_n), 1.0);
            const inc_n = Math.asin(sin_inc_n);
            const gamma_n = inc_n - look_n;

            const dep_f = Math.max(psi_c - SAR.theta_el / 2, 0.01);
            const look_f = Math.PI / 2 - dep_f;
            const sin_inc_f = Math.min((R_orbit_m / R_E) * Math.sin(look_f), 1.0);
            const inc_f = Math.asin(sin_inc_f);
            const gamma_f = inc_f - look_f;

            // Scale: pixel height maps to altitude; satellite at sY, nadir at nadirY
            const h_px = (vH - 2 * margin) * 0.9;
            const scale = h_px / h_m;
            const R_E_px = R_E * scale;
            const nadirY = sY + h_px;

            // Earth center is R_E_px below the nadir surface point
            const eCx = sX;
            const eCy = nadirY + R_E_px;

            // Ground point on the arc at a given gamma angle from nadir
            function gp(gamma) {
                return { x: eCx + R_E_px * Math.sin(gamma), y: eCy - R_E_px * Math.cos(gamma) };
            }
            // Canvas arc angle for a gamma value
            function arcA(gamma) { return -Math.PI / 2 + gamma; }

            const gpC = gp(gamma_c), gpN = gp(gamma_n), gpF = gp(gamma_f);

            // Slant ranges in pixels (chord distance from satellite to ground point)
            function slantPx(gamma) {
                const g = gp(gamma);
                return Math.sqrt((g.x - sX) ** 2 + (g.y - sY) ** 2);
            }

            // --- Draw Earth surface arc ---
            const arcExt = Math.max(gamma_f * 0.6, 0.015);
            const gMin = Math.max(-arcExt, -0.15);
            const gMax = gamma_f + arcExt;

            // Earth body fill below the arc
            const ptMin = gp(gMin), ptMax = gp(gMax);
            mapCtx.fillStyle = 'rgba(40,80,40,0.04)';
            mapCtx.beginPath();
            mapCtx.arc(eCx, eCy, R_E_px, arcA(gMin), arcA(gMax));
            mapCtx.lineTo(ptMax.x, vH + 10);
            mapCtx.lineTo(ptMin.x, vH + 10);
            mapCtx.closePath();
            mapCtx.fill();

            // Earth surface line (curved)
            mapCtx.strokeStyle = '#4a6a3a'; mapCtx.lineWidth = 2;
            mapCtx.beginPath();
            mapCtx.arc(eCx, eCy, R_E_px, arcA(gMin), arcA(gMax));
            mapCtx.stroke();

            // --- Tx Beam cone fill (follows curved surface) ---
            mapCtx.save(); mapCtx.globalAlpha = 0.07; mapCtx.fillStyle = '#3a8fd4';
            mapCtx.beginPath(); mapCtx.moveTo(sX, sY);
            mapCtx.lineTo(gpF.x, gpF.y);
            mapCtx.arc(eCx, eCy, R_E_px, arcA(gamma_f), arcA(gamma_n), true);
            mapCtx.closePath(); mapCtx.fill();
            mapCtx.globalAlpha = 1; mapCtx.restore();

            // Tx Beam edges
            mapCtx.strokeStyle = 'rgba(58,143,212,0.25)'; mapCtx.lineWidth = 1; mapCtx.setLineDash([4, 4]);
            mapCtx.beginPath(); mapCtx.moveTo(sX, sY); mapCtx.lineTo(gpF.x, gpF.y);
            mapCtx.moveTo(sX, sY); mapCtx.lineTo(gpN.x, gpN.y); mapCtx.stroke(); mapCtx.setLineDash([]);

            // Beam center
            mapCtx.strokeStyle = 'rgba(232,208,64,0.12)'; mapCtx.beginPath();
            mapCtx.moveTo(sX, sY); mapCtx.lineTo(gpC.x, gpC.y); mapCtx.stroke();

            // --- SCORE Rx Beam ---
            if (P.score) {
                const PRI_s = SAR.PRI;
                const twoR_near_s = 2 * SAR.R_near / C;
                const twoR_far_s = 2 * SAR.R_far / C;
                const echoMod_s = ((twoR_near_s % PRI_s) + PRI_s) % PRI_s;
                const echoDur_s = twoR_far_s - twoR_near_s;
                const tNow_s = (pulseUniforms.u_time.value % 1) * PRI_s;

                let isRx = false, eFrac = 0;
                const eE_s = echoMod_s + echoDur_s;
                if (eE_s > PRI_s) {
                    if (tNow_s >= echoMod_s) { isRx = true; eFrac = (tNow_s - echoMod_s) / echoDur_s; }
                    else if (tNow_s <= eE_s - PRI_s) { isRx = true; eFrac = (tNow_s + PRI_s - echoMod_s) / echoDur_s; }
                } else {
                    if (tNow_s >= echoMod_s && tNow_s <= eE_s) { isRx = true; eFrac = (tNow_s - echoMod_s) / echoDur_s; }
                }

                if (isRx) {
                    const t_now_s = twoR_near_s + eFrac * echoDur_s;
                    const PW_s = SAR.PW;
                    const t_ctr = Math.max(twoR_near_s, Math.min(t_now_s - PW_s / 2, twoR_far_s));
                    const R_sc = (t_ctr * C) / 2;
                    const R_orb_s = R_E + SAR.h;
                    const cos_lk = (R_orb_s * R_orb_s + R_sc * R_sc - R_E * R_E) / (2 * R_orb_s * Math.max(1, R_sc));
                    const rxDep = Math.PI / 2 - Math.acos(Math.max(-1, Math.min(1, cos_lk)));
                    const thetaRx = SAR.theta_el_rx || SAR.theta_el;

                    // SCORE beam gamma angles
                    const rxDepN = rxDep + thetaRx / 2;
                    const rxDepF = Math.max(rxDep - thetaRx / 2, 0.01);
                    const rxLkN = Math.max(Math.PI / 2 - rxDepN, 0);
                    const rxLkF = Math.PI / 2 - rxDepF;
                    const rxSiN = Math.min((R_orbit_m / R_E) * Math.sin(rxLkN), 1.0);
                    const rxSiF = Math.min((R_orbit_m / R_E) * Math.sin(rxLkF), 1.0);
                    const rxIncN = Math.asin(rxSiN), rxIncF = Math.asin(rxSiF);
                    const rxGN = rxIncN - rxLkN, rxGF = rxIncF - rxLkF;
                    const rxPN = gp(rxGN), rxPF = gp(rxGF);

                    mapCtx.save(); mapCtx.globalAlpha = 0.12; mapCtx.fillStyle = '#40e8a0';
                    mapCtx.beginPath(); mapCtx.moveTo(sX, sY);
                    mapCtx.lineTo(rxPF.x, rxPF.y);
                    mapCtx.arc(eCx, eCy, R_E_px, arcA(rxGF), arcA(rxGN), true);
                    mapCtx.closePath(); mapCtx.fill();
                    mapCtx.globalAlpha = 1; mapCtx.restore();

                    mapCtx.strokeStyle = 'rgba(64,232,160,0.5)'; mapCtx.lineWidth = 1; mapCtx.setLineDash([2, 5]);
                    mapCtx.beginPath(); mapCtx.moveTo(sX, sY); mapCtx.lineTo(rxPF.x, rxPF.y);
                    mapCtx.moveTo(sX, sY); mapCtx.lineTo(rxPN.x, rxPN.y); mapCtx.stroke(); mapCtx.setLineDash([]);
                }
            }

            // --- Scatterers on curved surface ---
            const nSc = 35, scPts = [];
            for (let i = 0; i < nSc; i++) {
                const f = i / (nSc - 1);
                const gamma_i = gamma_n + f * (gamma_f - gamma_n);
                const pt = gp(gamma_i);
                const d = Math.sqrt((pt.x - sX) ** 2 + (pt.y - sY) ** 2);
                const angle = Math.atan2(pt.y - sY, pt.x - sX);
                scPts.push({ x: pt.x, y: pt.y, dist: d, angle: angle });
            }
            scPts.forEach(s => {
                mapCtx.fillStyle = 'rgba(100,180,100,0.25)'; mapCtx.beginPath();
                mapCtx.arc(s.x, s.y, 1.5, 0, Math.PI * 2); mapCtx.fill();
            });

            // --- Pulse Propagation (using spherical slant range for timing) ---
            const T = pulseUniforms.u_time.value;
            const numP = Math.max(0.1, pulseUniforms.u_numPulses.value);
            const satToGndPx = slantPx(gamma_c);
            const pwPx = (SAR.PW * C) * (satToGndPx / SAR.R_slant);

            // Beam direction angle (from satellite to center ground point)
            const bDir2 = Math.atan2(gpC.y - sY, gpC.x - sX);

            // Draw TX Pulses
            const maxTxPulses = Math.ceil(numP * 3);
            for (let k = 0; k <= maxTxPulses; k++) {
                const i = Math.floor(T) - k;
                if (i < 0) break;
                const d_px = ((T - i) / numP) * satToGndPx;
                const pLead = d_px;
                const pTrail = Math.max(0, d_px - pwPx);
                const pWidth = pLead - pTrail;
                if (pWidth <= 0) continue;
                const txFrac = d_px / satToGndPx;
                if (txFrac > 2.7) continue;
                const aLimit = 0.7 * (P.txBright2D / 5);
                const a = txFrac < 1.2 ? aLimit : Math.max(0, aLimit * (1 - (txFrac - 1.2) / 1.5));
                mapCtx.strokeStyle = `rgba(232,208,64,${a})`;
                mapCtx.lineWidth = Math.max(1, pWidth);
                const drawR = Math.max(0.1, pTrail + pWidth / 2);
                // Beam half-angle from satellite toward near/far edges
                const halfA = Math.max(
                    Math.abs(Math.atan2(gpN.y - sY, gpN.x - sX) - bDir2),
                    Math.abs(Math.atan2(gpF.y - sY, gpF.x - sX) - bDir2)
                );
                mapCtx.beginPath(); mapCtx.arc(sX, sY, drawR, bDir2 - halfA, bDir2 + halfA); mapCtx.stroke();
            }

            // Draw Echo Waves & Calculate Rx Signal
            let rxP = 0;
            const maxRxPulses = Math.ceil(numP * 2);
            for (let s of scPts) {
                const delay_pulses = (s.dist / satToGndPx) * numP;
                const newest_hit_idx = Math.floor(T - delay_pulses);
                for (let k = 0; k <= maxRxPulses; k++) {
                    const i = newest_hit_idx - k;
                    if (i < 0) break;
                    const echo_time = T - (i + delay_pulses);
                    const r_echo = (echo_time / numP) * satToGndPx;
                    const pLead = r_echo;
                    const pTrail = Math.max(0, r_echo - pwPx);
                    const pWidth = pLead - pTrail;
                    if (pWidth <= 0) continue;
                    const echoFrac = r_echo / s.dist;
                    if (echoFrac > 2.3) continue;
                    if (s.dist <= pLead && s.dist >= pTrail) {
                        rxP += 1.0 * Math.max(0, 1 - r_echo / (satToGndPx * 3));
                    }
                    const ad = Math.abs(s.angle - bDir2);
                    if (ad < Math.PI / 2) {
                        const aLimit = 0.45 * (P.rxBright2D / 5);
                        const a = echoFrac < 1.3 ? aLimit : Math.max(0, aLimit * (1 - (echoFrac - 1.3) / 1.0));
                        mapCtx.strokeStyle = P.score ? `rgba(64,232,160,${a})` : `rgba(58,160,232,${a})`;
                        mapCtx.lineWidth = Math.max(1, pWidth);
                        const drawR = Math.max(0.1, pTrail + pWidth / 2);
                        mapCtx.beginPath(); mapCtx.arc(s.x, s.y, drawR, 0, Math.PI * 2); mapCtx.stroke();
                    }
                }
            }

            // Satellite icon
            mapCtx.fillStyle = '#ddd'; mapCtx.fillRect(sX - 10, sY - 2, 20, 5);
            mapCtx.fillStyle = '#3a6a9a'; mapCtx.fillRect(sX - 22, sY - 1, 13, 3); mapCtx.fillRect(sX + 10, sY - 1, 13, 3);
            mapCtx.fillStyle = '#5a8ab5'; mapCtx.font = '8px sans-serif'; mapCtx.fillText('SAT', sX - 8, sY - 6);
            mapCtx.fillStyle = '#4a6a3a'; mapCtx.fillText('GROUND', 8, nadirY - 4);
            mapCtx.fillStyle = '#444'; mapCtx.font = '8px sans-serif';
            mapCtx.fillText(`R: ${(SAR.R_slant / 1e3).toFixed(0)} km`, W - 68, sY + 18);
            mapCtx.fillText(`\u03C8: ${P.grz}\u00b0`, W - 68, sY + 28);

            // Timeline
            mapCtx.fillStyle = '#1a1a1a'; mapCtx.fillRect(0, vH, W, TLH);
            mapCtx.strokeStyle = '#333'; mapCtx.beginPath(); mapCtx.moveTo(0, vH); mapCtx.lineTo(W, vH); mapCtx.stroke();
            mapCtx.fillStyle = '#4a6a8a'; mapCtx.font = '8px sans-serif'; mapCtx.fillText('Rx Signal', 8, vH + 14);
            const bW = Math.min(rxP * 40, W - 20);
            if (bW > 0) { const bg = mapCtx.createLinearGradient(10, 0, 10 + bW, 0); bg.addColorStop(0, P.score ? '#40e8a0' : '#3aa0e8'); bg.addColorStop(1, 'rgba(0,0,0,0)'); mapCtx.fillStyle = bg; mapCtx.fillRect(10, vH + 18, bW, 6); }
            const gndRange = SAR.gnd_near + (SAR.gnd_far - SAR.gnd_near) / 2;
            mapCtx.fillStyle = '#555'; mapCtx.fillText(`Gnd: ${(gndRange / 1e3).toFixed(0)} km`, W - 80, vH + 14);
        }



        // ============================================================
        //  RESIZE HANDLER
        // ============================================================
        function handleResize() {
            const v3d = document.getElementById('view3d');
            renderer.setSize(v3d.clientWidth, v3d.clientHeight);
            cam3.aspect = v3d.clientWidth / v3d.clientHeight;
            cam3.updateProjectionMatrix();

            const sw = document.getElementById('sig-wrap');
            sigCanvas.width = sw.clientWidth * devicePixelRatio;
            sigCanvas.height = sw.clientHeight * devicePixelRatio;
            sigCanvas.style.width = sw.clientWidth + 'px';
            sigCanvas.style.height = sw.clientHeight + 'px';
            sigCtx.scale(devicePixelRatio, devicePixelRatio);

            const mw = document.getElementById('map-wrap');
            mapCanvas.width = mw.clientWidth * devicePixelRatio;
            mapCanvas.height = mw.clientHeight * devicePixelRatio;
            mapCanvas.style.width = mw.clientWidth + 'px';
            mapCanvas.style.height = mw.clientHeight + 'px';
            mapCtx.scale(devicePixelRatio, devicePixelRatio);
        }
        window.addEventListener('resize', handleResize);

        // ============================================================
        //  ANIMATION LOOP
        // ============================================================
        let lastTime = 0;
        let cameraInitialized = false;
        function animate(time) {
            try {
                requestAnimationFrame(animate);
                const dt = Math.min(time - lastTime, 50);
                lastTime = time;

                // Advance orbit at physically accurate speed relative to time scale
                let timeScale = (P.tsScale === 0) ? P.prf : P.tsScale * P.prf / 50;
                // timeScale represents (1 display-second = timeScale real-seconds / P.prf)
                // wait, if tsScale is 0, timeScale = P.prf. Thus 1 display second = 1 real second?
                // The intended meaning of timescale was: 1 PRI per display second.
                // 1 PRI = 1 / P.prf real seconds.
                // So 1 display second = 1/P.prf real seconds.
                const real_sec_per_display_sec = 1 / timeScale;
                const real_dt = (dt / 1000) * real_sec_per_display_sec * P.simSpeed;

                // Orbit position is driven by the latitude slider, no auto-advance

                // Rebuild 3D with new position
                rebuild3D();

                // Earth rotation — real rate scaled to simulation timescale
                earthGroup.rotation.y += 7.2722e-5 * real_dt;

                // Camera follows satellite smoothly
                const satWorldPos = new THREE.Vector3().setFromMatrixPosition(satGroup.matrix);
                if (!cameraInitialized || satWorldPos.length() < 0.1) {
                    if (satWorldPos.length() > 0.1) {
                        orbitControls.target.copy(satWorldPos);
                        const localOffset = new THREE.Vector3(-6, -2, -6).applyMatrix4(new THREE.Matrix4().extractRotation(satGroup.matrix));
                        cam3.position.copy(satWorldPos.clone().add(localOffset));
                        cameraInitialized = true;
                    }
                } else {
                    orbitControls.target.lerp(satWorldPos, 0.1);
                }

                // Advance volumetric pulses
                pulseUniforms.u_time.value += real_dt * P.prf;
                // Advance echo pulses (offset from Tx)
                echoUniforms.u_time.value += real_dt * P.prf;

                orbitControls.update();
                renderer.render(scene, cam3);

                // Draw 2D canvases
                const sw = document.getElementById('sig-wrap');
                sigCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
                drawSignal(dt);

                const mw = document.getElementById('map-wrap');
                mapCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
                drawMap(dt);
            } catch (e) {
                const el = document.getElementById('error-log');
                if (el) { el.style.display = 'block'; el.innerHTML += e.message + '<br/>' + e.stack + '<br/>'; }
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        handleResize();
        rebuild3D();
        updateMetrics();
        requestAnimationFrame(animate);
    </script>
</body>

</html>
